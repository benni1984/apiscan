name: ApiScan

options:
  bundleIdPrefix: com.apiscan
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  ApiScan:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ApiScan
        excludes:
          - Resources/Info.plist   # referenced via INFOPLIST_FILE, not compiled
    resources:
      - path: ApiScan/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.apiscan.app
        INFOPLIST_FILE: ApiScan/Resources/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic

  ApiScanTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ApiScanTests
    dependencies:
      - target: ApiScan
        embed: false

  ApiScanUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ApiScanUITests
    dependencies:
      - target: ApiScan

schemes:
  ApiScan:
    build:
      targets:
        ApiScan: all
        ApiScanTests: [test]
        ApiScanUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ApiScanTests
        - ApiScanUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
